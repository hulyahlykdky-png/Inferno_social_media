<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inferno - Alev Teması Sosyal Medya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0000 0%, #330000 100%);
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #ff6b35;
            text-shadow: 0 0 10px #ff4500;
        }
        
        .login-form {
            background: rgba(255, 69, 0, 0.1);
            border: 2px solid #ff4500;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ff6b35;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ff6b35;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        
        .post-form {
            background: rgba(255, 69, 0, 0.1);
            border: 2px solid #ff4500;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        .posts {
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ff6b35;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            background: linear-gradient(135deg, #ff4500 0%, #ff6b35 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            box-shadow: 0 0 15px #ff4500;
        }
        
        .post {
            background: rgba(255, 69, 0, 0.15);
            border-left: 4px solid #ff4500;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.2);
        }
        
        .post-user {
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 8px;
        }
        
        .post-content {
            color: #ddd;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .post-image {
            width: 100%;
            border-radius: 5px;
            margin: 10px 0;
            max-height: 300px;
            object-fit: cover;
        }
        
        .post-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        
        .post-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .like-btn, .comment-btn {
            background: none;
            color: #ff6b35;
            border: none;
            cursor: pointer;
            padding: 0;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .like-btn:hover, .comment-btn:hover {
            color: #ff4500;
        }
        
        .like-btn.liked {
            color: #ff4500;
        }
        
        .likes-count {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .comments {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        .comment {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 13px;
        }
        
        .comment-user {
            color: #ff6b35;
            font-weight: bold;
        }
        
        .comment-input-group {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        
        .comment-input-group input {
            flex: 1;
            padding: 5px;
            margin: 0;
        }
        
        .comment-input-group button {
            padding: 5px 10px;
            font-size: 12px;
            margin: 0;
        }
        
        .logout-btn {
            float: right;
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 0;
        }
        
        #imagePreview {
            width: 100%;
            max-height: 150px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🔥 INFERNO</div>
        
        <div class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username">Kullanıcı Adı:</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin...">
            </div>
            <div class="form-group">
                <label for="password">Şifre:</label>
                <input type="password" id="password" placeholder="Şifrenizi girin...">
            </div>
            <button onclick="login()">Giriş Yap 🔥</button>
        </div>
        
        <div class="post-form" id="postForm">
            <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
            <div style="clear: both;"></div>
            <textarea id="postInput" placeholder="Düşüncelerini paylaş..."></textarea>
            <input type="file" id="imageInput" accept="image/*">
            <img id="imagePreview">
            <button onclick="addPost()">Gönder 🔥</button>
        </div>
        
        <div class="posts" id="posts"></div>
    </div>
    
    <script>
        let currentUser = null;
        let posts = [];
        
        function loadPosts() {
            const saved = localStorage.getItem('infernoPosts');
            posts = saved ? JSON.parse(saved) : [];
            renderPosts();
        }
        
        function savePosts() {
            localStorage.setItem('infernoPosts', JSON.stringify(posts));
        }
        
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (username === '' || password === '') {
                alert('Lütfen kullanıcı adı ve şifre girin!');
                return;
            }
            
            currentUser = username;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('postForm').style.display = 'block';
            document.getElementById('posts').style.display = 'flex';
            document.getElementById('postInput').focus();
            loadPosts();
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('postForm').style.display = 'none';
            document.getElementById('posts').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('postInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        }
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
        
        function addPost() {
            const input = document.getElementById('postInput');
            const text = input.value.trim();
            const imagePreview = document.getElementById('imagePreview');
            
            if (text === '' && imagePreview.style.display === 'none') return;
            
            const post = {
                id: Date.now(),
                user: currentUser,
                content: text,
                image: imagePreview.src || null,
                time: new Date().toLocaleTimeString('tr-TR'),
                date: new Date().toLocaleDateString('tr-TR'),
                likes: [],
                comments: []
            };
            
            posts.unshift(post);
            savePosts();
            input.value = '';
            document.getElementById('imageInput').value = '';
            imagePreview.style.display = 'none';
            renderPosts();
        }
        
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            const index = post.likes.indexOf(currentUser);
            
            if (index > -1) {
                post.likes.splice(index, 1);
            } else {
                post.likes.push(currentUser);
            }
            
            savePosts();
            renderPosts();
        }
        
        function addComment(postId) {
            const commentInput = document.querySelector(`#commentInput-${postId}`);
            const text = commentInput.value.trim();
            
            if (text === '') return;
            
            const post = posts.find(p => p.id === postId);
            post.comments.push({
                user: currentUser,
                text: text,
                time: new Date().toLocaleTimeString('tr-TR')
            });
            
            savePosts();
            commentInput.value = '';
            renderPosts();
        }
        
        function renderPosts() {
            const postsDiv = document.getElementById('posts');
            postsDiv.innerHTML = '';
            
            posts.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post';
                
                const isLiked = post.likes.includes(currentUser);
                
                postEl.innerHTML = `
                    <div class="post-user">${post.user}</div>
                    <div class="post-content">${post.content}</div>
                    ${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                    <div class="post-time">${post.date} ${post.time}</div>
                    
                    <div class="post-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ❤️ Beğen (${post.likes.length})
                        </button>
                        <button class="comment-btn" onclick="document.getElementById('commentInput-${post.id}').focus()">
                            💬 Yorum (${post.comments.length})
                        </button>
                    </div>
                    
                    ${post.likes.length > 0 ? `<div class="likes-count">❤️ ${post.likes.join(', ')}</div>` : ''}
                    
                    <div class="comments">
                        ${post.comments.map(c => `
                            <div class="comment">
                                <span class="comment-user">${c.user}</span> ${c.text}
                                <div style="font-size: 11px; color: #666; margin-top: 3px;">${c.time}</div>
                            </div>
                        `).join('')}
                        <div class="comment-input-group">
                            <input type="text" id="commentInput-${post.id}" placeholder="Yorum yap...">
                            <button onclick="addComment(${post.id})">Gönder</button>
                        </div>
                    </div>
                `;
                
                postsDiv.appendChild(postEl);
            });
        }
        
        document.getElementById('postInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) addPost();
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
